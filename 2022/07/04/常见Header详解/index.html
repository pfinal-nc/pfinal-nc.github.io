ass="comment">// 设置页面304 没有修改  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;HTTP/1.1 304 Not Modified&#x27;</span>);  </span><br><span class="line">  </span><br><span class="line"><span class="comment">// 显示登录框，  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;HTTP/1.1 401 Unauthorized&#x27;</span>);  </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;WWW-Authenticate: Basic realm=&quot;登录信息&quot;&#x27;</span>);  </span><br><span class="line"><span class="keyword">echo</span> <span class="string">&#x27;显示的信息！&#x27;</span>;  </span><br><span class="line">  </span><br><span class="line"><span class="comment">// 403 禁止访问  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;HTTP/1.1 403 Forbidden&#x27;</span>);  </span><br><span class="line">   </span><br><span class="line"><span class="comment">// 404 错误  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;HTTP/1.1 404 Not Found&#x27;</span>);  </span><br><span class="line">  </span><br><span class="line"><span class="comment">// 500 服务器错误  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;HTTP/1.1 500 Internal Server Error&#x27;</span>);  </span><br><span class="line">   </span><br><span class="line"><span class="comment">// 3秒后重定向指定地址(也就是刷新到新页面与 &lt;meta http-equiv=&quot;refresh&quot; content=&quot;10;hhttps://friday-go.icu/ /&gt; 相同)  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Refresh: 3; url=https://friday-go.icu/&#x27;</span>);  </span><br><span class="line"><span class="keyword">echo</span> <span class="string">&#x27;10后跳转到https://friday-go.icu/&#x27;</span>;  </span><br><span class="line">   </span><br><span class="line"><span class="comment">// 重写 X-Powered-By 值  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;X-Powered-By: PHP/5.3.0&#x27;</span>);  </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;X-Powered-By: Brain/0.6b&#x27;</span>);  </span><br><span class="line">   </span><br><span class="line"><span class="comment">//设置上下文语言  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-language: en&#x27;</span>);  </span><br><span class="line">   </span><br><span class="line"><span class="comment">// 设置页面最后修改时间（多用于防缓存）  </span></span><br><span class="line"><span class="variable">$time</span> = <span class="title function_ invoke__">time</span>() - <span class="number">60</span>; <span class="comment">//建议使用filetime函数来设置页面缓存时间  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Last-Modified: &#x27;</span>.<span class="title function_ invoke__">gmdate</span>(<span class="string">&#x27;D, d M Y H:i:s&#x27;</span>, <span class="variable">$time</span>).<span class="string">&#x27; GMT&#x27;</span>);  </span><br><span class="line">  </span><br><span class="line"><span class="comment">// 设置内容长度  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Length: 39344&#x27;</span>);  </span><br><span class="line">   </span><br><span class="line"><span class="comment">// 设置头文件类型，可以用于流文件或者文件下载  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Type: application/octet-stream&#x27;</span>);  </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Disposition: attachment; filename=&quot;example.zip&quot;&#x27;</span>);   </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Transfer-Encoding: binary&#x27;</span>);  </span><br><span class="line"><span class="title function_ invoke__">readfile</span>(<span class="string">&#x27;example.zip&#x27;</span>);<span class="comment">//读取文件到客户端  </span></span><br><span class="line">   </span><br><span class="line"><span class="comment">//禁用页面缓存  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Cache-Control: no-cache, no-store, max-age=0, must-revalidate&#x27;</span>);  </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Expires: Mon, 26 Jul 1997 05:00:00 GMT&#x27;</span>);   </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Pragma: no-cache&#x27;</span>);  </span><br><span class="line">   </span><br><span class="line"><span class="comment">//设置页面头信息  </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Type: text/html; charset=iso-8859-1&#x27;</span>);  </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Type: text/html; charset=utf-8&#x27;</span>);  </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Type: text/plain&#x27;</span>);   </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Type: image/jpeg&#x27;</span>);   </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Type: application/zip&#x27;</span>);   </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Type: application/pdf&#x27;</span>);   </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Type: audio/mpeg&#x27;</span>);  </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Type: application/x-shockwave-flash&#x27;</span>);   </span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">###声明一个下载的文件###</span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Type: application/octet-stream&#x27;</span>);</span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Disposition: attachment; filename=&quot;ITblog.zip&quot;&#x27;</span>);</span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Transfer-Encoding: binary&#x27;</span>);</span><br><span class="line"><span class="title function_ invoke__">readfile</span>(<span class="string">&#x27;test.zip&#x27;</span>);</span><br><span class="line"><span class="comment">######</span></span><br><span class="line">  </span><br><span class="line"><span class="comment">###对当前文档禁用缓存###</span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Cache-Control: no-cache, no-store, max-age=0, must-revalidate&#x27;</span>);</span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Expires: Mon, 26 Jul 1997 05:00:00 GMT&#x27;</span>);</span><br><span class="line"><span class="comment">######</span></span><br><span class="line">  </span><br><span class="line"><span class="comment">###显示一个需要验证的登陆对话框### </span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;HTTP/1.1 401 Unauthorized&#x27;</span>); </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;WWW-Authenticate: Basic realm=&quot;Top Secret&quot;&#x27;</span>); </span><br><span class="line"><span class="comment">######</span></span><br><span class="line">  </span><br><span class="line"><span class="comment">###声明一个需要下载的xls文件###</span></span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Disposition: attachment; filename=ithhc.xlsx&#x27;</span>);</span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Type: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet&#x27;</span>);</span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Length: &#x27;</span>.<span class="title function_ invoke__">filesize</span>(<span class="string">&#x27;./test.xls&#x27;</span>)); </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Content-Transfer-Encoding: binary&#x27;</span>); </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Cache-Control: must-revalidate&#x27;</span>); </span><br><span class="line"><span class="title function_ invoke__">header</span>(<span class="string">&#x27;Pragma: public&#x27;</span>); </span><br><span class="line"><span class="title function_ invoke__">readfile</span>(<span class="string">&#x27;./test.xls&#x27;</span>); </span><br><span class="line"></span><br><span class="line"><span class="meta">?&gt;</span>  </span><br></pre></td></tr></table></figure>
