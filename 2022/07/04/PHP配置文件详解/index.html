    <figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br></pre></td><td class="code"><pre><span class="line">; 避免PHP信息暴露在http头中</span><br><span class="line">expose_php = Off</span><br><span class="line">; 避免暴露php调用mysql的错误信息</span><br><span class="line">display_errors = Off</span><br><span class="line">; 在关闭display_errors后开启PHP错误日志（路径在php-fpm.conf中配置）</span><br><span class="line">log_errors = On</span><br><span class="line">; 设置PHP的扩展库路径</span><br><span class="line">extension_dir = &quot;/usr/local/php7/lib/php/extensions/no-debug-non-zts-20141001/&quot;</span><br><span class="line">; 设置PHP的opcache和mysql动态库</span><br><span class="line">zend_extension=opcache.so</span><br><span class="line">extension=mysqli.so</span><br><span class="line">extension=pdo_mysql.so</span><br><span class="line">; 设置PHP的时区</span><br><span class="line">date.timezone = PRC</span><br><span class="line">; 开启opcache</span><br><span class="line">[opcache]</span><br><span class="line">; Determines if Zend OPCache is enabled</span><br><span class="line">opcache.enable=1</span><br><span class="line">;  设置PHP脚本允许访问的目录（需要根据实际情况配置）</span><br><span class="line">;open_basedir = /usr/share/nginx/html;</span><br><span class="line"></span><br><span class="line">;;;;;;;;;;;;;;;; </span><br><span class="line">; File Uploads ; </span><br><span class="line">;;;;;;;;;;;;;;;; </span><br><span class="line">file_uploads = On ; 是否允许HTTP方式文件上载 </span><br><span class="line">;upload_tmp_dir = ; 用于HTTP上载的文件的临时目录（未指定则使用系统默认） </span><br><span class="line">upload_max_filesize = 2M ; 上载文件的最大许可大小</span><br><span class="line">post_max_size = 128M</span><br><span class="line">upload_max_filesize = 128M</span><br><span class="line">; 这两个设置一样即可，可以更大但要注意超时</span><br><span class="line">max_execution_time = 30</span><br><span class="line">max_input_time = 600</span><br><span class="line">memory_limit = 32M</span><br><span class="line"></span><br><span class="line">; 上传大文件 </span><br><span class="line"></span><br><span class="line">; Fopen wrappers ; </span><br><span class="line">;;;;;;;;;;;;;;;;;; </span><br><span class="line">allow_url_fopen = On ; 是否允许把URLs当作http:.. 或把文件当作ftp:...</span><br><span class="line"></span><br><span class="line">[Debugger] </span><br><span class="line">debugger.host = localhost </span><br><span class="line">debugger.port = 7869 </span><br><span class="line">debugger.enabled = False</span><br><span class="line"></span><br><span class="line">[Session] </span><br><span class="line">session.save_handler = files ; 用于保存/取回数据的控制方式 </span><br><span class="line">session.save_path = C:\win\temp ; 在 save_handler 设为文件时传给控制器的参数， </span><br><span class="line">; 这是数据文件将保存的路径。 </span><br><span class="line">session.use_cookies = 1 ; 是否使用cookies </span><br><span class="line">session.name = PHPSESSID </span><br><span class="line">; 用在cookie里的session的名字 </span><br><span class="line">session.auto_start = 0 ; 在请求启动时初始化session </span><br><span class="line">session.cookie_lifetime = 0 ; 为按秒记的cookie的保存时间， </span><br><span class="line">; 或为0时，直到浏览器被重启 </span><br><span class="line">session.cookie_path = / ; cookie的有效路径 </span><br><span class="line">session.cookie_domain = ; cookie的有效域 </span><br><span class="line">session.serialize_handler = php ; 用于连接数据的控制器 </span><br><span class="line">; php是 PHP 的标准控制器。 </span><br><span class="line">session.gc_probability = 1 ; 按百分比的&#x27;garbage collection（碎片整理）&#x27;进程 </span><br><span class="line">; 在每次 session 初始化的时候开始的可能性。 </span><br><span class="line">session.gc_maxlifetime = 1440 ; 在这里数字所指的秒数后，保存的数据将被视为 </span><br><span class="line">; &#x27;碎片(garbage)&#x27;并由gc 进程清理掉。 </span><br><span class="line">session.referer_check = ; 检查 HTTP引用以使额外包含于URLs中的ids无效 </span><br><span class="line">session.entropy_length = 0 ; 从文件中读取多少字节 </span><br><span class="line">session.entropy_file = ; 指定这里建立 session id </span><br><span class="line">; session.entropy_length = 16 </span><br><span class="line">; session.entropy_file = /dev/urandom </span><br><span class="line">session.cache_limiter = nocache ; 设为&#123;nocache,private,public&#125;,以决定 HTTP 的 </span><br><span class="line">; 缓存问题 </span><br><span class="line">session.cache_expire = 180 ; 文档在 n 分钟后过时 </span><br><span class="line">session.use_trans_sid = 1 ; 使用过渡性的 sid 支持，若编译时许可了 </span><br><span class="line">; --enable-trans-sid </span><br><span class="line">url_rewriter.tags = &quot; a=href,area=href,frame=src,input=src,form=fakeentry&quot;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
