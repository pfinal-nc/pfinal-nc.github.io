<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980B9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A5276;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7FB3D5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7FB3D5;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="12"/>
  
  <text x="80" y="180" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15"># Developer Tools Collection</text>
  <text x="80" y="210" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">$ brew install tool-name</text>
  <text x="80" y="240" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">$ npm install -g @pfinal/cli-tool</text>
  <text x="80" y="270" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">CLI · IDE Plugins · Docker · Nginx</text>

  <text x="700" y="410" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">开发工具 · CLI 效率提升</text>
  <text x="700" y="435" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">VSCode · Git · Docker · Nginx</text>
  <text x="700" y="460" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">Terminal · Homebrew · 自动化脚本</text>

  <!-- Terminal window decoration -->
  <rect x="1010" y="105" width="130" height="95" rx="8" fill="#ffffff" opacity="0.06"/>
  <circle cx="1030" cy="122" r="5" fill="#ff5f56" opacity="0.3"/>
  <circle cx="1045" cy="122" r="5" fill="#ffbd2e" opacity="0.3"/>
  <circle cx="1060" cy="122" r="5" fill="#27CA40" opacity="0.3"/>
  
  <circle cx="135" cy="528" r="122" fill="#ffffff" opacity="0.04"/>

  <rect x="0" y="280" width="1200" height="3" fill="url(#accent)"/>

  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">在线工具</text>
  <text x="600" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="#7FB3D5" text-anchor="middle" letter-spacing="8">开发者效率利器合集</text>

  <text x="600" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="middle">PFinalClub 技术博客</text>
