  <rect width="1200" height="630" fill="url(#bg)" rx="12"/>
  
  <text x="80" y="180" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">$ docker compose up -d</text>
  <text x="80" y="210" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">$ kubectl apply -f deployment.yaml</text>
  <text x="80" y="240" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">CI/CD Pipeline → Test → Build → Deploy</text>
  <text x="80" y="270" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">Prometheus + Grafana + Loki Stack</text>

  <text x="720" y="410" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">Kubernetes · Docker · GitHub Actions</text>
  <text x="720" y="435" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">OpenTelemetry · Prometheus · ELK</text>
  <text x="720" y="460" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">CI/CD · GitOps · Observability</text>

  <rect x="1020" y="100" width="100" height="100" rx="10" fill="#ffffff" opacity="0.05"/>
  <circle cx="135" cy="525" r="118" fill="#ffffff" opacity="0.04"/>

  <rect x="0" y="280" width="1200" height="3" fill="url(#accent)"/>

  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">系统运维</text>
  <text x="600" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="#F5B041" text-anchor="middle" letter-spacing="8">DevOps 与云原生实践</text>

  <text x="600" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="middle">PFinalClub 技术博客</text>
