  <text x="80" y="270" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">Observability · SRE · Performance</text>

  <text x="720" y="410" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">软件工程原则 · 架构设计</text>
  <text x="720" y="435" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">可观测性 · 测试驱动 · 性能优化</text>
  <text x="720" y="460" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">GitOps · 微服务 · 设计模式</text>

  <circle cx="1070" cy="140" r="90" fill="#ffffff" opacity="0.05"/>
  <circle cx="130" cy="530" r="120" fill="#ffffff" opacity="0.03"/>

  <rect x="0" y="280" width="1200" height="3" fill="url(#accent)"/>

  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">思考与方法</text>
  <text x="600" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="#85929E" text-anchor="middle" letter-spacing="8">工程思维与最佳实践</text>

  <text x="600" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="middle">PFinalClub 技术博客</text>
