<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ADD8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066B3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5DC9E2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#5DC9E2;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="12"/>
  
  <!-- Decorative code elements -->
  <text x="80" y="180" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">func main() {</text>
  <text x="80" y="210" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">    ch := make(chan int)</text>
  <text x="80" y="240" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">    go worker(ch)</text>
  <text x="80" y="270" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">}</text>

  <text x="780" y="400" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">interface{} · goroutine · channel</text>
  <text x="780" y="425" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">defer · select · context</text>
  <text x="780" y="450" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">go mod tidy · error wrapping</text>

  <!-- Decorative circles -->
  <circle cx="1050" cy="150" r="80" fill="#ffffff" opacity="0.06"/>
  <circle cx="150" cy="520" r="120" fill="#ffffff" opacity="0.04"/>

  <!-- Accent bar -->
  <rect x="0" y="280" width="1200" height="3" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">Golang</text>
  <text x="600" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="#5DC9E2" text-anchor="middle" letter-spacing="8">GO 后端开发实战</text>

  <!-- Bottom branding -->
  <text x="600" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="middle">PFinalClub 技术博客</text>
</svg>