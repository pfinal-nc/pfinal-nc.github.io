<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8E44AD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B2C6F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D7BDE2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#D7BDE2;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="12"/>
  
  <text x="80" y="180" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">## Penetration Testing</text>
  <text x="80" y="210" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">$ nmap -sV target.com</text>
  <text x="80" y="240" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">$ sqlmap -u "https://..." --dbs</text>
  <text x="80" y="270" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15">> Metasploit · Burp Suite</text>

  <text x="700" y="410" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">Red Team · Blue Team</text>
  <text x="700" y="435" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">Recon · Exploit · Post-Exploit</text>
  <text x="700" y="460" font-family="monospace" font-size="15" fill="#ffffff" opacity="0.12">Privilege Escalation · Pivoting</text>

  <polygon points="1060,110 1110,160 1090,220 1030,220 1010,160" fill="#ffffff" opacity="0.06"/>
  <circle cx="140" cy="520" r="115" fill="#ffffff" opacity="0.04"/>

  <rect x="0" y="280" width="1200" height="3" fill="url(#accent)"/>

  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">攻防研究</text>
  <text x="600" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="#D7BDE2" text-anchor="middle" letter-spacing="8">渗透测试与红队实战</text>

  <text x="600" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="middle">PFinalClub 技术博客</text>
</svg>